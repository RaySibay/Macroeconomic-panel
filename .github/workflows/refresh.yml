name: Refresh China free liquidity data

on:
  workflow_dispatch:
  schedule:
    # 17:30 Beijing time, Monday-Friday.
    - cron: "30 9 * * 1-5"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build and post data
        run: python scripts/refresh_data.py --worker-url "$WORKER_URL" --token "$INGEST_TOKEN"
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
